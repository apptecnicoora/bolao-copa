<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão - 16 Avos</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h2 { text-align: center; color: #f5c518; }
        
        .form-group { margin-bottom: 20px; background: #2b2b2b; padding: 15px; border-radius: 8px; }
        .form-group input[type="text"] { width: 100%; padding: 12px; border-radius: 5px; border: none; box-sizing: border-box; font-size: 16px; margin-top: 10px; }
        
        /* Estilos do Avatar */
        .avatar-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; justify-content: center; }
        .avatar-option { cursor: pointer; text-align: center; font-size: 28px; background: #1a1a1a; padding: 8px; border-radius: 50%; border: 2px solid transparent; transition: 0.3s; }
        .avatar-option input { display: none; }
        .avatar-option:has(input:checked) { border-color: #f5c518; background: #3d3d3d; transform: scale(1.1); }
        
        /* Estilos dos Jogos */
        .jogo-card { background-color: #2b2b2b; padding: 15px; margin-bottom: 15px; border-radius: 8px; text-align: center; font-size: 18px;}
        .placar-inputs { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; }
        input[type="number"] { width: 55px; height: 45px; text-align: center; font-size: 20px; border-radius: 5px; border: none; font-weight: bold;}
        
        /* Área de Pênaltis e Classificado */
        .penaltis-container { display: none; margin-top: 15px; background-color: #1a1a1a; padding: 10px; border-radius: 5px; border: 1px solid #f5c518; }
        .penaltis-container label { cursor: pointer; margin: 0 10px; font-size: 16px; font-weight: bold; }
        .classificado { display: none; margin-top: 10px; color: #28a745; font-weight: bold; font-size: 16px; }
        
        .btn-submit { width: 100%; background-color: #28a745; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; font-weight: bold; transition: 0.2s;}
        .btn-submit:hover { background-color: #218838; }
        
        /* Área do Resultado Copiável */
        #resultado-container { display: none; margin-top: 20px; background: #333; padding: 15px; border-radius: 8px; }
        textarea { width: 100%; height: 350px; background: #1a1a1a; color: white; border: 1px solid #555; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 14px; box-sizing: border-box; resize: none;}
        .btn-copy { width: 100%; background-color: #f5c518; color: #1a1a1a; padding: 15px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏆 BOLÃO DA COPA</h2>
        <form id="bolaoForm" onsubmit="gerarResultado(event)">
            
            <div class="form-group">
                <label><b>1. Escolha seu Avatar:</b></label>
                <div class="avatar-container">
                    <label class="avatar-option"><input type="radio" name="avatar" value="🦁" checked>🦁</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="👽">👽</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🥷">🥷</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🧙‍♂️">🧙‍♂️</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🤖">🤖</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="👻">👻</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🐶">🐶</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🦊">🦊</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🐻">🐻</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🐼">🐼</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🐯">🐯</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🐸">🐸</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🐵">🐵</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🦄">🦄</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🐉">🐉</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🦅">🦅</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="🦈">🦈</label>
                    <label class="avatar-option"><input type="radio" name="avatar" value="⚽">⚽</label>
                </div>
            </div>

            <div class="form-group">
                <label><b>2. Seu Nome:</b></label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
            </div>

            <h3 style="text-align: center; margin-top: 30px;">3. Seus Palpites</h3>
            <div id="jogos-container"></div>

            <button type="submit" class="btn-submit">Gerar Meus Palpites</button>
        </form>

        <div id="resultado-container">
            <h3 style="color: #f5c518; text-align: center;">Pronto! Agora é só copiar e mandar no grupo:</h3>
            <textarea id="texto-gerado" readonly></textarea>
            <button class="btn-copy" onclick="copiarTexto()">📋 Copiar Texto</button>
        </div>
    </div>

    <script>
        // Lista de jogos com bandeiras
        const jogos = [
            { id: 1, f1: "🇿🇦", t1: "África do Sul", f2: "🇨🇦", t2: "Canadá", data: "28/06 - 16h" },
            { id: 2, f1: "🇧🇷", t1: "Brasil", f2: "🇯🇵", t2: "Japão", data: "29/06 - 14h" },
            { id: 3, f1: "🇩🇪", t1: "Alemanha", f2: "🇵🇾", t2: "Paraguai", data: "28/06 - 17h30" },
            { id: 4, f1: "🇳🇱", t1: "Holanda", f2: "🇲🇦", t2: "Marrocos", data: "28/06 - 22h" },
            { id: 5, f1: "🇨🇮", t1: "Costa do Marfim", f2: "🇳🇴", t2: "Noruega", data: "30/06 - 14h" },
            { id: 6, f1: "🇫🇷", t1: "França", f2: "🇸🇪", t2: "Suécia", data: "30/06 - 18h" },
            { id: 7, f1: "🇲🇽", t1: "México", f2: "🇪🇨", t2: "Equador", data: "30/06 - 22h" },
            { id: 8, f1: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", t1: "Inglaterra", f2: "🇨🇩", t2: "RD Congo", data: "01/07 - 13h" },
            { id: 9, f1: "🇧🇪", t1: "Bélgica", f2: "🇸🇳", t2: "Senegal", data: "01/07 - 17h" },
            { id: 10, f1: "🇺🇸", t1: "EUA", f2: "🇧🇦", t2: "Bósnia", data: "01/07 - 21h" },
            { id: 11, f1: "🇪🇸", t1: "Espanha", f2: "🇦🇹", t2: "Áustria", data: "02/07 - 16h" },
            { id: 12, f1: "🇵🇹", t1: "Portugal", f2: "🇭🇷", t2: "Croácia", data: "02/07 - 20h" },
            { id: 13, f1: "🇨🇭", t1: "Suíça", f2: "🇩🇿", t2: "Argélia", data: "03/07 - 00h" },
            { id: 14, f1: "🇦🇺", t1: "Austrália", f2: "🇪🇬", t2: "Egito", data: "03/07 - 15h" },
            { id: 15, f1: "🇦🇷", t1: "Argentina", f2: "🇨🇻", t2: "Cabo Verde", data: "03/07 - 19h" },
            { id: 16, f1: "🇨🇴", t1: "Colômbia", f2: "🇬🇭", t2: "Gana", data: "03/07 - 22h30" }
        ];

        // Monta a interface dos jogos dinamicamente
        const container = document.getElementById('jogos-container');
        jogos.forEach(j => {
            container.innerHTML += `
                <div class="jogo-card">
                    ${j.f1} <b>${j.t1}</b> x <b>${j.t2}</b> ${j.f2}<br>
                    <div style="font-size: 12px; color: #aaaaaa; margin-top: 5px;">${j.data}</div>
                    
                    <div class="placar-inputs">
                        <input type="number" id="j${j.id}_t1" min="0" required oninput="calcularVencedor(${j.id})"> X 
                        <input type="number" id="j${j.id}_t2" min="0" required oninput="calcularVencedor(${j.id})">
                    </div>

                    <div id="penaltis_${j.id}" class="penaltis-container">
                        <div style="color:#f5c518; font-size: 14px; margin-bottom: 5px;">Empate! Quem avança nos pênaltis?</div>
                        <label><input type="radio" name="penalti_${j.id}" value="${j.t1}" onclick="marcarPenalti(${j.id})"> ${j.f1} ${j.t1}</label>
                        <label><input type="radio" name="penalti_${j.id}" value="${j.t2}" onclick="marcarPenalti(${j.id})"> ${j.t2} ${j.f2}</label>
                    </div>

                    <div id="classificado_${j.id}" class="classificado"></div>
                </div>
            `;
        });

        // Lógica para detectar vencedor ou empate
        function calcularVencedor(id) {
            const val1 = document.getElementById(`j${id}_t1`).value;
            const val2 = document.getElementById(`j${id}_t2`).value;
            const divPenaltis = document.getElementById(`penaltis_${id}`);
            const divClassificado = document.getElementById(`classificado_${id}`);
            const jogo = jogos.find(j => j.id === id);
            const radiosPenalti = document.getElementsByName(`penalti_${id}`);

            // Remove a obrigatoriedade dos pênaltis temporariamente
            radiosPenalti.forEach(r => r.required = false);

            if (val1 === "" || val2 === "") {
                divPenaltis.style.display = "none";
                divClassificado.style.display = "none";
                return;
            }

            const p1 = parseInt(val1);
            const p2 = parseInt(val2);

            if (p1 > p2) {
                divPenaltis.style.display = "none";
                divClassificado.style.display = "block";
                divClassificado.innerHTML = `✅ Avança: ${jogo.t1}`;
            } else if (p2 > p1) {
                divPenaltis.style.display = "none";
                divClassificado.style.display = "block";
                divClassificado.innerHTML = `✅ Avança: ${jogo.t2}`;
            } else {
                // Empate - Mostrar opções de pênalti
                divPenaltis.style.display = "block";
                divClassificado.style.display = "none";
                // Torna a escolha dos pênaltis obrigatória para enviar o formulário
                radiosPenalti.forEach(r => r.required = true);
                
                // Se já tinha alguém marcado antes de mudar o placar, atualiza
                const checked = document.querySelector(`input[name="penalti_${id}"]:checked`);
                if (checked) {
                    divClassificado.style.display = "block";
                    divClassificado.innerHTML = `✅ Avança nos Pênaltis: ${checked.value}`;
                }
            }
        }

        // Função ao clicar na opção de pênalti
        function marcarPenalti(id) {
            const divClassificado = document.getElementById(`classificado_${id}`);
            const selecionado = document.querySelector(`input[name="penalti_${id}"]:checked`).value;
            divClassificado.style.display = "block";
            divClassificado.innerHTML = `✅ Avança nos Pênaltis: ${selecionado}`;
        }

        // Geração do Texto Final
        function gerarResultado(event) {
            event.preventDefault();
            
            const nome = document.getElementById('nome').value.toUpperCase();
            const avatar = document.querySelector('input[name="avatar"]:checked').value;
            
            let texto = `🏆 *BOLÃO DA COPA* 🏆\n👤 *${nome}* ${avatar}\n\n`;
            
            jogos.forEach(j => {
                const p1 = document.getElementById(`j${j.id}_t1`).value;
                const p2 = document.getElementById(`j${j.id}_t2`).value;
                let infoExtra = "";

                if (p1 === p2) {
                    const penaltiVencedor = document.querySelector(`input[name="penalti_${j.id}"]:checked`).value;
                    infoExtra = `\n↳ ✅ ${penaltiVencedor} avança (Pênaltis)`;
                } else {
                    const vencedor = parseInt(p1) > parseInt(p2) ? j.t1 : j.t2;
                    infoExtra = `\n↳ ✅ ${vencedor} avança`;
                }

                texto += `${j.f1} ${j.t1} *${p1} x ${p2}* ${j.t2} ${j.f2}${infoExtra}\n\n`;
            });

            document.getElementById('texto-gerado').value = texto.trim();
            document.getElementById('resultado-container').style.display = 'block';
            
            document.getElementById('resultado-container').scrollIntoView({ behavior: 'smooth' });
        }

        function copiarTexto() {
            const areaDeTexto = document.getElementById('texto-gerado');
            areaDeTexto.select();
            areaDeTexto.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(areaDeTexto.value).then(() => {
                alert("✅ Palpites copiados com sucesso!\nAgora é só colar no grupo.");
            }).catch(() => {
                alert("Erro ao copiar. Tente selecionar o texto manualmente.");
            });
        }
    </script>
</body>
</html>
