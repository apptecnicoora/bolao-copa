        /* ГЃrea do Resultado CopiГЎvel */
        #resultado-container { display: none; margin-top: 20px; background: #333; padding: 15px; border-radius: 8px; }
        textarea { width: 100%; height: 250px; background: #1a1a1a; color: white; border: 1px solid #555; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 14px; box-sizing: border-box; }
        .btn-copy { width: 100%; background-color: #f5c518; color: #1a1a1a; padding: 15px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

        // Monta os jogos na tela
        const container = document.getElementById('jogos-container');
        jogos.forEach(j => {

                    <div style="font-size: 12px; color: #aaaaaa; margin-top: 5px;">${j.data}</div>
                    <div class="placar-inputs">
                        <input type="number" id="j${j.id}_t1" min="0" required> X 
                        <input type="number" id="j${j.id}_t2" min="0" required>

        // FunГ§ГЈo que gera o texto formatado no textarea
        function gerarResultado(event) {
            event.preventDefault();
            
            const nome = document.getElementById('nome').value.toUpperCase();
            const avatar = document.querySelector('input[name="avatar"]:checked').value;
            
            let texto = `рџЏ† *BOLГѓO DA COPA* рџЏ†\nрџ‘¤ *${nome}* ${avatar}\n\n`;
            
            jogos.forEach(j => {
                const placar1 = document.getElementById(`j${j.id}_t1`).value;
                const placar2 = document.getElementById(`j${j.id}_t2`).value;
                texto += `${j.f1} ${j.t1} *${placar1} x ${placar2}* ${j.t2} ${j.f2}\n`;
            });

            document.getElementById('texto-gerado').value = texto;
            document.getElementById('resultado-container').style.display = 'block';
            
            // Rola a pГЎgina para baixo para a pessoa ver o resultado
            document.getElementById('resultado-container').scrollIntoView({ behavior: 'smooth' });
        }

        // FunГ§ГЈo do botГЈo de copiar
        function copiarTexto() {
            const areaDeTexto = document.getElementById('texto-gerado');
            areaDeTexto.select();
            areaDeTexto.setSelectionRange(0, 99999); // Para dispositivos mГіveis
            navigator.clipboard.writeText(areaDeTexto.value).then(() => {
                alert("вњ… Palpites copiados com sucesso!\nAgora Г© sГі colar no grupo do WhatsApp.");
            }).catch(() => {
                alert("Erro ao copiar. Tente selecionar o texto manualmente.");
            });
        }
    </script>
</body>
</html>
