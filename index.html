<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão - 16 Avos</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h2 { text-align: center; color: #f5c518; }
        .form-group { margin-bottom: 20px; }
        .form-group input[type="text"] { width: 100%; padding: 10px; border-radius: 5px; border: none; box-sizing: border-box; }
        .jogo-card { background-color: #2b2b2b; padding: 15px; margin-bottom: 15px; border-radius: 8px; text-align: center; }
        .placar-inputs { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; }
        input[type="number"] { width: 50px; height: 40px; text-align: center; font-size: 18px; border-radius: 5px; border: none; }
        .btn-submit { width: 100%; background-color: #28a745; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏆 BOLÃO DA COPA</h2>
        <form id="bolaoForm" onsubmit="enviarWhatsApp(event)">
            <div class="form-group">
                <label><b>Seu Nome:</b></label><br>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="jogo-card">
                <b>África do Sul</b> x <b>Canadá</b><br>
                <div style="font-size: 12px; color: #aaaaaa; margin-top: 5px;">28/06 - 16h</div>
                <div class="placar-inputs">
                    <input type="number" id="j1_t1" min="0" required> X <input type="number" id="j1_t2" min="0" required>
                </div>
            </div>

            <div class="jogo-card">
                <b>Brasil</b> x <b>Japão</b><br>
                <div style="font-size: 12px; color: #aaaaaa; margin-top: 5px;">29/06 - 14h</div>
                <div class="placar-inputs">
                    <input type="number" id="j2_t1" min="0" required> X <input type="number" id="j2_t2" min="0" required>
                </div>
            </div>

            <div class="jogo-card">
                <b>Alemanha</b> x <b>Paraguai</b><br>
                <div style="font-size: 12px; color: #aaaaaa; margin-top: 5px;">28/06 - 17h30</div>
                <div class="placar-inputs">
                    <input type="number" id="j3_t1" min="0" required> X <input type="number" id="j3_t2" min="0" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">Enviar Palpites via WhatsApp</button>
        </form>
    </div>

    <script>
        function enviarWhatsApp(event) {
            event.preventDefault();
            
            // Seu número de telefone com DDD (ex: 5511999999999)
            const seuNumero = "5500000000000"; 
            
            const nome = document.getElementById('nome').value;
            const j1_t1 = document.getElementById('j1_t1').value;
            const j1_t2 = document.getElementById('j1_t2').value;
            const j2_t1 = document.getElementById('j2_t1').value;
            const j2_t2 = document.getElementById('j2_t2').value;
            const j3_t1 = document.getElementById('j3_t1').value;
            const j3_t2 = document.getElementById('j3_t2').value;

            let texto = `🏆 *BOLÃO DA COPA - ${nome}* 🏆%0A%0A`;
            texto += `🇿🇦 África do Sul ${j1_t1} x ${j1_t2} Canadá 🇨🇦%0A`;
            texto += `🇧🇷 Brasil ${j2_t1} x ${j2_t2} Japão 🇯🇵%0A`;
            texto += `🇩🇪 Alemanha ${j3_t1} x ${j3_t2} Paraguai 🇵🇾%0A`;

            const url = `https://wa.me/${89994645040}?text=${texto}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
