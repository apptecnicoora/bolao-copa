<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão - 16 Avos</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h2 { text-align: center; color: #f5c518; }
        .form-group { margin-bottom: 20px; }
        .form-group input[type="text"] { width: 100%; padding: 12px; border-radius: 5px; border: none; box-sizing: border-box; font-size: 16px; }
        .jogo-card { background-color: #2b2b2b; padding: 15px; margin-bottom: 15px; border-radius: 8px; text-align: center; }
        .placar-inputs { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; }
        input[type="number"] { width: 55px; height: 45px; text-align: center; font-size: 20px; border-radius: 5px; border: none; font-weight: bold;}
        .btn-submit { width: 100%; background-color: #28a745; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏆 BOLÃO DA COPA</h2>
        <form id="bolaoForm" onsubmit="enviarWhatsApp(event)">
            <div class="form-group">
                <label><b>Seu Nome:</b></label><br>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
            </div>

            <div id="jogos-container"></div>

            <button type="submit" class="btn-submit">Enviar Palpites via WhatsApp</button>
        </form>
    </div>

    <script>
        // Lista completa de jogos baseada na sua imagem
        const jogos = [
            { id: 1, t1: "África do Sul", t2: "Canadá", data: "28/06 - 16h" },
            { id: 2, t1: "Brasil", t2: "Japão", data: "29/06 - 14h" },
            { id: 3, t1: "Alemanha", t2: "Paraguai", data: "28/06 - 17h30" },
            { id: 4, t1: "Holanda", t2: "Marrocos", data: "28/06 - 22h" },
            { id: 5, t1: "Costa do Marfim", t2: "Noruega", data: "30/06 - 14h" },
            { id: 6, t1: "França", t2: "Suécia", data: "30/06 - 18h" },
            { id: 7, t1: "México", t2: "Equador", data: "30/06 - 22h" },
            { id: 8, t1: "Inglaterra", t2: "RD Congo", data: "01/07 - 13h" },
            { id: 9, t1: "Bélgica", t2: "Senegal", data: "01/07 - 17h" },
            { id: 10, t1: "EUA", t2: "Bósnia", data: "01/07 - 21h" },
            { id: 11, t1: "Espanha", t2: "Áustria", data: "02/07 - 16h" },
            { id: 12, t1: "Portugal", t2: "Croácia", data: "02/07 - 20h" },
            { id: 13, t1: "Suíça", t2: "Argélia", data: "03/07 - 00h" },
            { id: 14, t1: "Austrália", t2: "Egito", data: "03/07 - 15h" },
            { id: 15, t1: "Argentina", t2: "Cabo Verde", data: "03/07 - 19h" },
            { id: 16, t1: "Colômbia", t2: "Gana", data: "03/07 - 22h30" }
        ];

        // Gera o HTML dos jogos dinamicamente
        const container = document.getElementById('jogos-container');
        jogos.forEach(j => {
            container.innerHTML += `
                <div class="jogo-card">
                    <b>${j.t1}</b> x <b>${j.t2}</b><br>
                    <div style="font-size: 12px; color: #aaaaaa; margin-top: 5px;">${j.data}</div>
                    <div class="placar-inputs">
                        <input type="number" id="j${j.id}_t1" min="0" required> X 
                        <input type="number" id="j${j.id}_t2" min="0" required>
                    </div>
                </div>
            `;
        });

        function enviarWhatsApp(event) {
            event.preventDefault();
            
            // COLOQUE SEU NÚMERO AQUI (Ex: 5586999999999 para Piauí)
            const seuNumero = "5500000000000"; 
            const nome = document.getElementById('nome').value;
            
            let texto = `🏆 *BOLÃO DA COPA - ${nome.toUpperCase()}* 🏆%0A%0A`;
            
            jogos.forEach(j => {
                const placar1 = document.getElementById(`j${j.id}_t1`).value;
                const placar2 = document.getElementById(`j${j.id}_t2`).value;
                texto += `⚽ ${j.t1} ${placar1} x ${placar2} ${j.t2}%0A`;
            });

            const url = `https://wa.me/${seuNumero}?text=${texto}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
